<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Noah Brandt – Besucherkarte</title>

<style>
:root{
  --sky1:#e0f2fe;
  --sky2:#bae6fd;
  --glass:rgba(255,255,255,0.7);
  --text:#0f172a;
  --muted:#334155;
  --accent:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,Segoe UI,Roboto,Arial;
}

body{
  min-height:100vh;
  overflow:hidden;
  background:linear-gradient(to bottom,var(--sky1),var(--sky2),#fff);
}

/* ================= SUN ================= */
.sun{
  position:fixed;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#fff7b1,#facc15);
  box-shadow:0 0 70px rgba(250,204,21,.7);
  animation:sun 5s ease-in-out infinite;
  z-index:1;
}

@keyframes sun{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(10px);}
}

/* ================= MAIN ================= */
.wrapper{
  position:relative;
  z-index:2;
  padding:70px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER CARD */
.card{
  width:420px;
  padding:25px;
  border-radius:22px;
  background:var(--glass);
  backdrop-filter:blur(14px);
  text-align:center;
  border:1px solid rgba(255,255,255,.8);
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  max-width:900px;
  width:100%;
}

.tile{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(148,163,184,.3);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.tile:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 20px 40px rgba(56,189,248,.25);
}

.icon{font-size:1.5rem;}
.title{font-weight:600;margin-top:8px;}
.value{color:var(--muted);font-size:.9rem;margin-top:4px;}

.span-2{grid-column:span 2;}

/* ================= CHAT GUIDE FIGURE ================= */
.guide{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  display:flex;
  gap:10px;
  z-index:999;
}

/* character */
.person{
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#93c5fd);
  box-shadow:0 0 20px rgba(56,189,248,.6);
  position:relative;
  animation:float 4s ease-in-out infinite;
}

.person::after{
  content:"🙂";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* chat box */
.chat{
  flex:1;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(10px);
  border:1px solid rgba(148,163,184,.3);
  border-radius:14px;
  padding:10px;
  font-size:.85rem;
  color:var(--text);
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* typing cursor */
.cursor::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* ================= RIPPLE ================= */
.ripple{
  position:fixed;
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,.6);
  animation:ripple 1s forwards;
  pointer-events:none;
}

@keyframes ripple{
  to{transform:scale(15);opacity:0;}
}

/* ================= BUBBLES ================= */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.6);
  animation:rise linear forwards;
}

@keyframes rise{
  to{transform:translateY(-120vh);opacity:0;}
}

/* responsive */
@media(max-width:800px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .card{width:100%;}
}
@media(max-width:500px){
  .grid{grid-template-columns:1fr;}
  .guide{width:90%;right:5%;}
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="wrapper">

  <div class="card">
    <h1>Noah Brandt</h1>
    <p>Willkommen auf der Besucherkarte</p>
  </div>

  <div class="grid">

    <div class="tile" onclick="location.href='mailto:noah@brandt.de'">
      <div class="icon">📧</div>
      <div class="title">E-Mail</div>
      <div class="value">Kontakt aufnehmen</div>
    </div>

    <div class="tile" onclick="location.href='tel:+491701234567'">
      <div class="icon">📞</div>
      <div class="title">Telefon</div>
      <div class="value">Anrufen</div>
    </div>

    <div class="tile">
      <div class="icon">📍</div>
      <div class="title">Ort</div>
      <div class="value">Deutschland</div>
    </div>

    <div class="tile span-2">
      <div class="icon">👤</div>
      <div class="title">Über mich</div>
      <div class="value">
        Ich entwickle Interfaces, die sich wie kleine lebendige Systeme anfühlen.
      </div>
    </div>

    <div class="tile">
      <div class="icon">🌐</div>
      <div class="title">Website</div>
      <div class="value">Portfolio</div>
    </div>

    <div class="tile">
      <div class="icon">⚡</div>
      <div class="title">Skills</div>
      <div class="value">HTML • CSS • JS</div>
    </div>

  </div>
</div>

<!-- ================= CHAT GUIDE ================= -->
<div class="guide">
  <div class="person"></div>
  <div class="chat cursor" id="chat"></div>
</div>

<script>

/* ================= TYPEWRITER CHAT ================= */
const messages = [
"Hallo 👋 Willkommen auf der Besucherkarte von Noah Brandt.",
"Klicke auf die Kacheln — jede führt dich irgendwo hin.",
"Oben siehst du die Sonne… sie ist hier immer ein bisschen lebendig ☀️",
"Wenn du klickst, entstehen kleine Wellen in der Realität ✨",
"Ich begleite dich ein Stück durch diese kleine digitale Welt."
];

let msgIndex = 0;
let charIndex = 0;
let chat = document.getElementById("chat");

function type(){
  let text = messages[msgIndex];

  chat.innerHTML = text.substring(0, charIndex) + "<span class='cursor'></span>";

  charIndex++;

  if(charIndex > text.length){
    setTimeout(()=>{
      charIndex = 0;
      msgIndex = (msgIndex + 1) % messages.length;
    }, 1500);
  }

  setTimeout(type, 35);
}
type();

/* ================= RIPPLE ON CLICK ================= */
document.addEventListener("click",(e)=>{
  const r = document.createElement("div");
  r.className="ripple";
  r.style.left=e.clientX+"px";
  r.style.top=e.clientY+"px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),1000);
});

/* ================= FLOATING BUBBLES ================= */
function bubble(){
  const b=document.createElement("div");
  b.className="bubble";

  const size=Math.random()*20+10;
  b.style.width=size+"px";
  b.style.height=size+"px";
  b.style.left=Math.random()*100+"vw";
  b.style.bottom="-50px";
  b.style.animationDuration=(Math.random()*4+3)+"s";

  document.body.appendChild(b);
  setTimeout(()=>b.remove(),6000);
}
setInterval(bubble,180);

</script>

</body>
</html>
