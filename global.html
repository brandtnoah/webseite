<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Noah Brandt – Besucherkarte</title>

<style>
:root{
  --sky1:#e0f2fe;
  --sky2:#bae6fd;
  --glass:rgba(255,255,255,0.7);
  --text:#0f172a;
  --muted:#334155;
  --accent:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,Segoe UI,Roboto,Arial;
}

/* ✅ ONLY CHANGE: scrolling enabled on mobile */
body{
  min-height:100vh;
  /* changed from overflow:hidden */
  overflow-x:hidden;
  overflow-y:auto;

  -webkit-overflow-scrolling: touch;

  background:linear-gradient(to bottom,var(--sky1),var(--sky2),#fff);
}

/* ================= SUN ================= */
.sun{
  position:fixed;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#fff7b1,#facc15);
  box-shadow:0 0 70px rgba(250,204,21,.7);
  animation:sun 5s ease-in-out infinite;
  z-index:1;
}

@keyframes sun{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(10px);}
}

/* ================= INTRO (NEU) ================= */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(to bottom,#e0f2fe,#bae6fd);
  z-index:999;
  overflow:hidden;
}

/* main text */
#intro h1{
  font-size:3rem;
  letter-spacing:2px;
  color:#0f172a;
  animation:popIn .4s ease-out;
  position:relative;
}

@keyframes popIn{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* wave effect */
#intro::after{
  content:"";
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,.5);
  animation:wave 2s ease-out forwards;
}

@keyframes wave{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(8);opacity:0;}
}

/* fragment pieces */
.piece{
  position:absolute;
  font-size:2.8rem;
  font-weight:600;
  color:#0f172a;
  animation:explode 1.2s forwards ease-out;
  pointer-events:none;
}

@keyframes explode{
  0%{
    transform:translate(0,0) rotate(0deg) scale(1);
    opacity:1;
  }
  100%{
    transform:translate(var(--x),var(--y)) rotate(720deg) scale(0.3);
    opacity:0;
    filter:blur(4px);
  }
}

/* ================= MAIN ================= */
.wrapper{
  position:relative;
  z-index:2;
  padding:70px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARD */
.card{
  width:420px;
  padding:25px;
  border-radius:22px;
  background:var(--glass);
  backdrop-filter:blur(14px);
  text-align:center;
  border:1px solid rgba(255,255,255,.8);
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  max-width:900px;
  width:100%;
}

.tile{
  background:rgba(255,255,255,.75);
  border:1px solid rgba(148,163,184,.3);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.25s;
}

.tile:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 20px 40px rgba(56,189,248,.25);
}

.icon{font-size:1.5rem;}
.title{font-weight:600;margin-top:8px;}
.value{color:var(--muted);font-size:.9rem;margin-top:4px;}

.span-2{grid-column:span 2;}

/* ================= CHAT GUIDE ================= */
.guide{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  display:flex;
  gap:10px;
  z-index:999;
}

.person{
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#93c5fd);
  box-shadow:0 0 20px rgba(56,189,248,.6);
  animation:float 4s ease-in-out infinite;
}

.person::after{
  content:"🙂";
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  font-size:28px;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.chat{
  flex:1;
  background:rgba(255,255,255,.85);
  border-radius:14px;
  padding:10px;
  font-size:.85rem;
  backdrop-filter:blur(10px);
}

/* cursor */
.cursor::after{
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* ripple */
.ripple{
  position:fixed;
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,.6);
  animation:ripple 1s forwards;
}

@keyframes ripple{
  to{transform:scale(15);opacity:0;}
}

/* ✅ extra mobile spacing fix */
@media(max-width:500px){
  body{padding-bottom:80px;}
}
</style>
</head>

<body>

<div class="sun"></div>

<!-- ================= INTRO ================= -->
<div id="intro">
  <h1 id="welcome">HERZLICH WILLKOMMEN</h1>
</div>

<div class="wrapper">

  <div class="card">
    <h1>Noah Brandt</h1>
    <p>Willkommen auf der Besucherkarte</p>
  </div>

  <div class="grid">

    <div class="tile" onclick="location.href='mailto:noah@brandt.de'">
      <div class="icon">📧</div>
      <div class="title">E-Mail</div>
      <div class="value">Kontakt aufnehmen</div>
    </div>

    <div class="tile" onclick="location.href='tel:+491701234567'">
      <div class="icon">📞</div>
      <div class="title">Telefon</div>
      <div class="value">Anrufen</div>
    </div>

    <div class="tile">
      <div class="icon">📍</div>
      <div class="title">Ort</div>
      <div class="value">Deutschland</div>
    </div>

    <div class="tile span-2">
      <div class="icon">👤</div>
      <div class="title">Über mich</div>
      <div class="value">
        Ich entwickle Interfaces, die sich wie lebendige Systeme anfühlen.
      </div>
    </div>

    <div class="tile">
      <div class="icon">🌐</div>
      <div class="title">Website</div>
      <div class="value">Portfolio</div>
    </div>

    <div class="tile">
      <div class="icon">⚡</div>
      <div class="title">Skills</div>
      <div class="value">HTML • CSS • JS</div>
    </div>

  </div>
</div>

<!-- CHAT -->
<div class="guide">
  <div class="person"></div>
  <div class="chat" id="chat"></div>
</div>

<script>

/* INTRO EXPLOSION (UNCHANGED) */
setTimeout(() => {
  const intro = document.getElementById("intro");
  const text = document.getElementById("welcome");

  const letters = "HERZLICH WILLKOMMEN".split("");
  const rect = text.getBoundingClientRect();

  intro.innerHTML = "";

  letters.forEach((l, i) => {
    const span = document.createElement("div");
    span.className = "piece";
    span.textContent = l;

    const angle = Math.random()*2*Math.PI;
    const distance = Math.random()*300;

    span.style.left = rect.left + i*18 + "px";
    span.style.top = rect.top + "px";

    span.style.setProperty("--x", Math.cos(angle)*distance+"px");
    span.style.setProperty("--y", Math.sin(angle)*distance+"px");

    intro.appendChild(span);
  });

  setTimeout(()=> intro.style.display="none",1200);

},2000);

/* CHAT */
const messages=[
"Hallo 👋 Willkommen auf der Besucherkarte von Noah Brandt.",
"Klicke auf die Kacheln — jede führt dich irgendwo hin.",
"Ich begleite dich durch diese kleine digitale Welt."
];

let i=0,j=0;
const chat=document.getElementById("chat");

function type(){
  let t=messages[i];
  chat.innerHTML=t.substring(0,j)+"<span class='cursor'></span>";
  j++;

  if(j>t.length){
    setTimeout(()=>{
      j=0;
      i=(i+1)%messages.length;
    },1200);
  }

  setTimeout(type,35);
}
type();

/* ripple */
document.addEventListener("click",(e)=>{
  const r=document.createElement("div");
  r.className="ripple";
  r.style.left=e.clientX+"px";
  r.style.top=e.clientY+"px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),1000);
});

</script>

</body>
</html>
