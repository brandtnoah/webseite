<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Noah Brandt Universum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#070a14;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
  font-size:26px;
  letter-spacing:3px;
}

/* UNIVERSE */
.universe{
  position:relative;
  height:700px;
  background:radial-gradient(circle at center,#0b1020,#000);
  overflow:hidden;
}

/* PLANETS */
.planet{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:inset -10px -10px 20px rgba(0,0,0,0.6),
             0 0 15px rgba(255,255,255,0.2);
}

.p1{background:radial-gradient(circle,#4facfe,#001a33);}
.p2{background:radial-gradient(circle,#ff9966,#3a1a10);}
.p3{background:radial-gradient(circle,#66ffcc,#003333);}
.p4{background:radial-gradient(circle,#ddd,#222);}
.p5{background:radial-gradient(circle,#8b5cf6,#1a0033);}
.p6{background:radial-gradient(circle,#00ff88,#002211);}
.p7{background:radial-gradient(circle,#ffcc00,#332200);}
.p8{background:linear-gradient(to bottom,#0077ff 50%,#f4d03f 50%);}

.label{
  position:absolute;
  top:65px;
  width:100%;
  text-align:center;
  font-size:11px;
}

/* MOON */
.moon{
  position:absolute;
  top:40px;
  right:80px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#aaa,#444);
  animation:moonGlow 6s infinite;
  z-index:1;
}

@keyframes moonGlow{
  0%{box-shadow:0 0 5px #fff;}
  50%{box-shadow:0 0 35px #fff;}
  100%{box-shadow:0 0 5px #fff;}
}

/* ===== QUIZ (UNTER DEM MOND, NICHT ÜBERLAPPEND) ===== */
#quizBox{
  position:absolute;
  top:150px;              /* <<< UNTER MOND */
  right:30px;
  width:300px;
  background:#111;
  border:1px solid #444;
  padding:15px;
  z-index:2;
}

button{
  width:100%;
  margin-top:5px;
  padding:8px;
  cursor:pointer;
}

#result{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

/* END-EFFEKT */
#endScreen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  z-index:999;
  text-align:center;
  padding-top:200px;
}

#endScreen h1{
  font-size:28px;
}

</style>
</head>

<body>

<header>NOAH BRANDT’S UNIVERSUM</header>

<div class="universe">

<div class="moon"></div>

<!-- PLANETEN -->
<div class="planet p1" style="top:120px;left:100px"><div class="label">Lebenslauf</div></div>
<div class="planet p2" style="top:200px;left:260px"><div class="label">Beratung</div></div>
<div class="planet p3" style="top:320px;left:420px"><div class="label">Projekte</div></div>
<div class="planet p4" style="top:160px;left:520px"><div class="label">Kontakt</div></div>
<div class="planet p5" style="top:360px;left:140px"><div class="label">Archiv</div></div>
<div class="planet p6" style="top:420px;left:320px"><div class="label">Experiment</div></div>
<div class="planet p7" style="top:80px;left:420px"><div class="label">Forschung</div></div>
<div class="planet p8" style="top:500px;left:540px"><div class="label">Strand</div></div>

<!-- QUIZ -->
<div id="quizBox">
<h3>Quiz: Noah Brandt</h3>

<div id="question">Lade...</div>

<button onclick="answer(0)">A</button>
<button onclick="answer(1)">B</button>
<button onclick="answer(2)">C</button>

<div id="result"></div>
</div>

</div>

<!-- END SCREEN -->
<div id="endScreen">
<h1>Herzlichen Glückwunsch!</h1>
<p>Alles richtig beantwortet.</p>
<p>Bitte Screenshot erstellen und an Noah Brandt senden.</p>
<p>Eine kleine Belohnung ist ggf. möglich.</p>
<button onclick="location.reload()">Neustart</button>
</div>

<script>

/* ===== QUIZ ===== */

const quiz = [
{q:"Was ist Noah Brandt?",a:["Astronaut","Bibliothekar","Musiker"],correct:1},
{q:"Wo arbeitet er?",a:["Bibliothek","Theater","Krankenhaus"],correct:0},
{q:"Zusätzliche Tätigkeit?",a:["Pilot","Autor","Mechaniker"],correct:1},
{q:"Hauptsprache?",a:["Deutsch","Japanisch","Italienisch"],correct:0},
{q:"Kein Bereich?",a:["Beratung","Bibliothek","Raumfahrt"],correct:2},
{q:"Projektart?",a:["Webprojekt","Spiel","Film"],correct:0},
{q:"Rolle oft?",a:["Autor","Soldat","Sportler"],correct:0},
{q:"Nicht dazu?",a:["Bibliothek","Architektur","Publikation"],correct:1},
{q:"Planeten sind?",a:["Themen","Echte Planeten","Fehler"],correct:0},
{q:"Letzte Frage korrekt?",a:["Ja","Nein","Vielleicht"],correct:0}
];

let index=0;
let score=0;

function load(){
if(index>=quiz.length){
document.getElementById("endScreen").style.display="block";
return;
}

let q=quiz[index];
document.getElementById("question").innerText=q.q;

let buttons=document.querySelectorAll("#quizBox button");
buttons[0].innerText=q.a[0];
buttons[1].innerText=q.a[1];
buttons[2].innerText=q.a[2];
}

function answer(i){
let q=quiz[index];

if(i===q.correct){
score++;
index++;
document.getElementById("result").innerText="✔ richtig";
load();
}else{
score=0;
index=0;
document.getElementById("result").innerText="✖ falsch – Neustart";
load();
}
}

load();

</script>

</body>
</html>
