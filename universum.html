<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Noah Brandt Universum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#070a14;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
  font-size:26px;
  letter-spacing:3px;
}

/* UNIVERSE */
.universe{
  position:relative;
  height:700px;
  background:radial-gradient(circle at center,#0b1020,#000);
  overflow:hidden;
}

/* PLANETS */
.planet{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:inset -10px -10px 20px rgba(0,0,0,0.6),
             0 0 15px rgba(255,255,255,0.2);
}

.p1{background:radial-gradient(circle,#4facfe,#001a33);}
.p2{background:radial-gradient(circle,#ff9966,#3a1a10);}
.p3{background:radial-gradient(circle,#66ffcc,#003333);}
.p4{background:radial-gradient(circle,#ddd,#222);}
.p5{background:radial-gradient(circle,#8b5cf6,#1a0033);}
.p6{background:radial-gradient(circle,#00ff88,#002211);}
.p7{background:radial-gradient(circle,#ffcc00,#332200);}
.p8{background:linear-gradient(to bottom,#0077ff 50%,#f4d03f 50%);}

.label{
  position:absolute;
  top:65px;
  width:100%;
  text-align:center;
  font-size:11px;
}

/* MOON */
.moon{
  position:absolute;
  top:40px;
  right:80px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#aaa,#444);
  animation:moonGlow 6s infinite;
}

@keyframes moonGlow{
  0%{box-shadow:0 0 5px #fff;}
  50%{box-shadow:0 0 35px #fff;}
  100%{box-shadow:0 0 5px #fff;}
}

/* QUIZ */
#quizBox{
  position:absolute;
  top:150px;
  right:30px;
  width:300px;
  background:#111;
  border:1px solid #444;
  padding:15px;
}

#quizBox button{
  width:100%;
  margin-top:5px;
  padding:8px;
}

/* ================= PONG ================= */

#pongSection{
  padding:20px;
  text-align:center;
}

canvas{
  background:black;
  border:2px solid #333;
  display:block;
  margin:10px auto;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#222;
  border:1px solid #555;
  padding:12px 18px;
  cursor:pointer;
  user-select:none;
}

.btn:active{background:#444;}

#startBtn{
  padding:10px 20px;
  margin:10px;
}

/* WIN */
#win{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  text-align:center;
  padding-top:120px;
  z-index:999;
}

footer{
  text-align:center;
  padding:12px;
  background:#05070f;
  border-top:1px solid #222;
  font-size:12px;
}

footer a{
  color:#aaa;
  margin:0 10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>NOAH BRANDT’S UNIVERSUM</header>

<div class="universe">

<div class="moon"></div>

<div class="planet p1" style="top:120px;left:100px"></div>
<div class="planet p2" style="top:200px;left:260px"></div>
<div class="planet p3" style="top:320px;left:420px"></div>
<div class="planet p4" style="top:160px;left:520px"></div>
<div class="planet p5" style="top:360px;left:140px"></div>
<div class="planet p6" style="top:420px;left:320px"></div>
<div class="planet p7" style="top:80px;left:420px"></div>
<div class="planet p8" style="top:500px;left:540px"></div>

<div id="quizBox">
<h3>Quiz</h3>
<div id="question"></div>
<button onclick="answer(0)"></button>
<button onclick="answer(1)"></button>
<button onclick="answer(2)"></button>
</div>

</div>

<!-- PONG -->
<div id="pongSection">

<h2>PONG</h2>

<button id="startBtn" onclick="startGame()">START</button>

<canvas id="game" width="700" height="400"></canvas>

<div class="controls">
  <div class="btn" onmousedown="up=true" onmouseup="up=false" ontouchstart="up=true" ontouchend="up=false">⬆</div>
  <div class="btn" onmousedown="down=true" onmouseup="down=false" ontouchstart="down=true" ontouchend="down=false">⬇</div>
</div>

<p>Punkte Spieler: <span id="ps">0</span> | KI: <span id="ai">0</span></p>

</div>

<div id="win">
<h1>Gewonnen!</h1>
<p>Kennenlernen mit Noah Brandt im Café möglich.</p>
<button onclick="location.reload()">Neustart</button>
</div>

<footer>
<a href="#">Impressum</a>
<a href="#">Datenschutz</a>
<a href="#">Nutzungsbedingungen</a>
</footer>

<script>

/* ================= KEY FIX ================= */
/* 👉 WICHTIG: Pfeiltasten jetzt global + verhindern Scrollen */

window.addEventListener("keydown",function(e){
  if(["ArrowUp","ArrowDown"].includes(e.key)){
    e.preventDefault();
  }

  if(e.key==="ArrowUp") up=true;
  if(e.key==="ArrowDown") down=true;
});

window.addEventListener("keyup",function(e){
  if(e.key==="ArrowUp") up=false;
  if(e.key==="ArrowDown") down=false;
});

/* ================= QUIZ ================= */

const quiz=[
{q:"Noah Brandt ist?",a:["Bibliothekar","Pilot","Arzt"],c:0},
{q:"Er arbeitet in?",a:["Bibliothek","Hotel","Raumstation"],c:0},
{q:"Er ist auch?",a:["Autor","Musiker","Bäcker"],c:0}
];

let qi=0;

function loadQ(){
let q=quiz[qi];
document.getElementById("question").innerText=q.q;
let b=document.querySelectorAll("#quizBox button");
b[0].innerText=q.a[0];
b[1].innerText=q.a[1];
b[2].innerText=q.a[2];
}

function answer(i){
if(i===quiz[qi].c){
qi++;
loadQ();
}else{
qi=0;
loadQ();
}
}
loadQ();

/* ================= PONG ================= */

let c=document.getElementById("game");
let ctx=c.getContext("2d");

let p={x:20,y:150,w:10,h:80,score:0};
let ai={x:670,y:150,w:10,h:80,score:0,fail:0};
let b={x:350,y:200,dx:4,dy:3,r:8};

let up=false,down=false;
let running=false;

function startGame(){running=true;}

function move(){
if(up)p.y-=6;
if(down)p.y+=6;

p.y=Math.max(0,Math.min(320,p.y));

ai.fail++;
let mistake = ai.fail % 4 === 0;

if(!mistake){
ai.y += (ai.y < b.y ? 3 : -3);
}else{
ai.y += (Math.random()>0.5?8:-8);
}

ai.y=Math.max(0,Math.min(320,ai.y));

b.x+=b.dx;
b.y+=b.dy;

if(b.y<0||b.y>400)b.dy*=-1;

if(b.x<p.x+10&&b.y>p.y&&b.y<p.y+80)b.dx*=-1;
if(b.x>ai.x&&b.y>ai.y&&b.y<ai.y+80)b.dx*=-1;

if(b.x<0){ai.score++;reset();}
if(b.x>700){p.score++;reset();}

document.getElementById("ps").innerText=p.score;
document.getElementById("ai").innerText=ai.score;

if(p.score>=5)document.getElementById("win").style.display="block";
}

function reset(){
b.x=350;b.y=200;
b.dx*=-1;
}

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,700,400);

ctx.fillStyle="lime";
ctx.fillRect(p.x,p.y,p.w,p.h);

ctx.fillStyle="red";
ctx.fillRect(ai.x,ai.y,ai.w,ai.h);

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}

function loop(){
if(running){
move();
draw();
}
requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
