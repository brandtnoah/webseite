<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Noah Brandt Universum</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070a14;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:26px;
  letter-spacing:3px;
}

.universe{
  position:relative;
  height:700px;
  background:radial-gradient(circle,#0b1020,#000);
  overflow:hidden;
}

.planet{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  cursor:pointer;
}

.planet a{
  display:block;
  color:white;
  text-align:center;
  font-size:10px;
  padding-top:65px;
  text-decoration:none;
}

.p1{background:radial-gradient(circle,#4facfe,#001a33);}
.p2{background:radial-gradient(circle,#ff9966,#3a1a10);}
.p3{background:radial-gradient(circle,#66ffcc,#003333);}
.p4{background:radial-gradient(circle,#ddd,#222);}
.p5{background:radial-gradient(circle,#8b5cf6,#1a0033);}
.p6{background:radial-gradient(circle,#00ff88,#002211);}
.p7{background:radial-gradient(circle,#ffcc00,#332200);}
.p8{background:linear-gradient(#0077ff,#f4d03f);}

.moon{
  position:absolute;
  top:40px;
  right:80px;
  width:80px;height:80px;
  border-radius:50%;
  background:white;
}

#quizBox{
  position:absolute;
  top:150px;
  right:30px;
  width:260px;
  background:#111;
  padding:10px;
}

#quizBox button{width:100%;margin-top:5px;}

#infoBox{
  margin:20px auto;
  width:90%;
  max-width:700px;
  background:#111;
  padding:15px;
  text-align:center;
}

#reactionSection,#pongSection{
  text-align:center;
  padding:20px;
}

#clickBox{
  width:200px;
  height:200px;
  margin:20px auto;
  background:#222;
  border:2px solid #555;
  cursor:pointer;
}

canvas{
  background:black;
  display:block;
  margin:auto;
  border:2px solid #333;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:12px;
  background:#222;
  border:1px solid #555;
  user-select:none;
}

/* MOBILE */
@media(max-width:768px){
.universe{height:auto;min-height:900px;}
.planet{transform:scale(0.75);}
#quizBox{position:relative;width:90%;margin:auto;}
canvas{width:100%;}
}
</style>
</head>

<body>

<header>NOAH BRANDT’S UNIVERSUM</header>

<div class="universe">
<div class="moon"></div>

<div class="planet p1" style="top:120px;left:100px"><a href="#">Lebenslauf</a></div>
<div class="planet p2" style="top:200px;left:260px"><a href="#">Beratung</a></div>
<div class="planet p3" style="top:320px;left:420px"><a href="#">Besuchskarte</a></div>
<div class="planet p4" style="top:160px;left:520px"><a href="#">Kontakt</a></div>
<div class="planet p5" style="top:360px;left:140px"><a href="#">Internet</a></div>
<div class="planet p6" style="top:420px;left:320px"><a href="#">Kennenlernen</a></div>
<div class="planet p7" style="top:80px;left:420px"><a href="#">Eigenverlag</a></div>
<div class="planet p8" style="top:500px;left:540px"><a href="#">Strand</a></div>

<div id="quizBox">
<h3>Quiz</h3>
<div id="qText"></div>
<button onclick="answer(0)"></button>
<button onclick="answer(1)"></button>
<button onclick="answer(2)"></button>
</div>
</div>

<div id="infoBox">
<strong>Hinweis:</strong><br>
Alle Spiele → Screenshot senden
</div>

<!-- REACTION -->
<div id="reactionSection">
<h2>Reaktion</h2>
<button onclick="startReaction()">START</button>
<div id="clickBox"></div>
<div id="reactionScore">0 | 20s</div>
</div>

<!-- PONG -->
<div id="pongSection">
<h2>PONG</h2>
<button onclick="startPong()">START</button>
<canvas id="game" width="700" height="400"></canvas>
<p>Player: <span id="pScore">0</span> | AI: <span id="aiScore">0</span></p>

<div class="controls">
<div class="btn" ontouchstart="up=1" ontouchend="up=0">⬆</div>
<div class="btn" ontouchstart="down=1" ontouchend="down=0">⬇</div>
</div>
</div>

<script>

/* ================= QUIZ ================= */
let quiz=[
{q:"Noah Brandt ist?",a:["Bibliothekar","Pilot","Arzt"],c:0},
{q:"Er arbeitet in?",a:["Bibliothek","Hotel","Raumstation"],c:0},
{q:"Er ist auch?",a:["Autor","Musiker","Bäcker"],c:0}
];

let qi=0;

function loadQuiz(){
let q=quiz[qi];
document.getElementById("qText").innerText=q.q;
let b=document.querySelectorAll("#quizBox button");
b[0].innerText=q.a[0];
b[1].innerText=q.a[1];
b[2].innerText=q.a[2];
}

function answer(i){
if(i===quiz[qi].c){qi++;}
else{qi=0;}
if(qi>=quiz.length)alert("Quiz gewonnen!");
loadQuiz();
}
loadQuiz();

/* ================= REACTION ================= */
let rScore=0,time=20,running=false;

document.getElementById("clickBox").onclick=()=>{
if(running)rScore++;
};

function startReaction(){
rScore=0;
time=20;
running=true;

let int=setInterval(()=>{
time--;
document.getElementById("reactionScore").innerText=rScore+" | "+time+"s";

if(time<=0){
clearInterval(int);
running=false;
if(rScore>=70)alert("Reaction gewonnen!");
}
},1000);
}

/* ================= PONG FIXED ================= */
let c,ctx;
let px=150,py=150;
let ay=150;
let bx=350,by=200;
let dx=4,dy=3;
let pScore=0,aiScore=0;
let up=0,down=0;
let loopRunning=false;

function startPong(){
if(loopRunning) return; // verhindert doppelte loops
loopRunning=true;

c=document.getElementById("game");
ctx=c.getContext("2d");

pScore=0;aiScore=0;
px=150;py=150;
ay=150;
bx=350;by=200;
dx=4;dy=3;

gameLoop();
}

function gameLoop(){
if(!loopRunning) return;

ctx.clearRect(0,0,700,400);

/* player */
if(up)py-=6;
if(down)py+=6;

/* ai */
ay += (by-ay)*0.06;

/* ball */
bx+=dx;
by+=dy;

if(by<0||by>400)dy*=-1;

/* player hit */
if(bx<30 && by>py && by<py+80) dx*=-1;

/* ai hit */
if(bx>670 && by>ay && by<ay+80) dx*=-1;

/* score */
if(bx<0){aiScore++;reset();}
if(bx>700){pScore++;reset();}

/* draw */
ctx.fillStyle="white";
ctx.fillRect(20,py,10,80);
ctx.fillRect(670,ay,10,80);
ctx.beginPath();
ctx.arc(bx,by,8,0,Math.PI*2);
ctx.fill();

document.getElementById("pScore").innerText=pScore;
document.getElementById("aiScore").innerText=aiScore;

if(pScore>=10){
alert("PONG GEWONNEN");
loopRunning=false;
return;
}

requestAnimationFrame(gameLoop);
}

function reset(){
bx=350;by=200;
dx*=-1;
dy=(Math.random()*4-2);
}

</script>

</body>
</html>
