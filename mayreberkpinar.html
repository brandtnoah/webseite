<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayre Berkpinar • 1923 – 2019</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }

        .hero-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), url('https://picsum.photos/id/1015/2000/1200');
            background-size: cover;
            background-position: center;
        }
        .flame { animation: flicker 1.2s infinite alternate; }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(5deg); }
            100% { transform: scale(1) rotate(-3deg); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- Header -->
    <header class="border-b border-zinc-800 bg-black/80 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-5xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-dove text-rose-300 text-2xl"></i>
                <h1 class="heading-font text-2xl tracking-wider text-white">Mayre Berkpinar</h1>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#hero-section" onclick="smoothScrollTo('hero-section')" class="hover:text-rose-300">Start</a>
                <a href="#bio" onclick="smoothScrollTo('bio')" class="hover:text-rose-300">Geschichte</a>
                <a href="#poem" onclick="smoothScrollTo('poem')" class="hover:text-rose-300">Gedichte</a>
                <a href="#gallery" onclick="smoothScrollTo('gallery')" class="hover:text-rose-300">Fotos</a>
                <a href="#candle" onclick="smoothScrollTo('candle')" class="hover:text-rose-300">Kerze</a>
                <a href="#guestbook" onclick="smoothScrollTo('guestbook')" class="hover:text-rose-300">Gästebuch</a>
            </nav>
            <button onclick="exportConfig()" class="text-xs px-4 py-2 border border-rose-400 text-rose-300 hover:bg-rose-400 hover:text-black rounded-full transition-all">
                <i class="fa-solid fa-download"></i> Exportieren
            </button>
        </div>
    </header>

    <!-- Hero + Bio + Candle + Guestbook bleiben gleich (aus Platzgründen hier gekürzt) -->

    <!-- POEM SECTION - Jetzt mit mehreren Gedichten -->
    <section id="poem" class="bg-zinc-900 py-24">
        <div class="max-w-3xl mx-auto px-6">
            <div class="flex justify-between items-center mb-10">
                <h2 class="heading-font text-5xl font-semibold">Gedichte für Mayre</h2>
                <button onclick="addNewPoem()" class="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-plus"></i> Neues Gedicht hinzufügen
                </button>
            </div>
            <div id="poems-container" class="space-y-12"></div>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="bg-black py-20">
        <div class="max-w-5xl mx-auto px-6">
            <div class="flex justify-between items-center mb-12">
                <h2 class="heading-font text-5xl font-semibold">Erinnerungsfotos</h2>
                <button onclick="addGalleryImage()" class="px-6 py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-plus"></i> Bild hinzufügen
                </button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6" id="gallery-grid"></div>
        </div>
    </section>

    <!-- Image Modal -->
    <div id="image-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200]">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-lg w-full mx-4">
            <h3 class="text-xl mb-4">Bild-URL ändern / hinzufügen</h3>
            <input id="new-image-url" type="text" placeholder="https://..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-6">
            <div class="flex gap-3">
                <button onclick="applyImageChange()" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl">Speichern</button>
                <button onclick="closeImageModal()" class="flex-1 py-4 bg-zinc-700 rounded-2xl">Abbrechen</button>
            </div>
        </div>
    </div>

    <!-- Poem Modal -->
    <div id="poem-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200]">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full mx-4">
            <h3 class="text-xl mb-4" id="poem-modal-title">Gedicht</h3>
            <textarea id="poem-textarea" rows="12" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 mb-6"></textarea>
            <div class="flex gap-3">
                <button onclick="savePoem()" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl">Speichern</button>
                <button onclick="closePoemModal()" class="flex-1 py-4 bg-zinc-700 rounded-2xl">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        let currentImageElement = null;
        let currentEditPoemIndex = null;

        function smoothScrollTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        // ==================== BILDER ====================
        function changeImage(el) {
            currentImageElement = el;
            document.getElementById('new-image-url').value = el.src;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
        }

        function applyImageChange() {
            const url = document.getElementById('new-image-url').value.trim();
            if (!url) return;

            if (currentImageElement) {
                currentImageElement.src = url;
            }

            // Speichern für Dauerhaftigkeit
            let saved = JSON.parse(localStorage.getItem('mayre_images') || '{}');
            saved[currentImageElement ? currentImageElement.id : 'gallery-' + Date.now()] = url;
            localStorage.setItem('mayre_images', JSON.stringify(saved));

            loadGallery();
            closeImageModal();
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
        }

        function addGalleryImage() {
            currentImageElement = null;
            document.getElementById('new-image-url').value = '';
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
        }

        function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            let images = JSON.parse(localStorage.getItem('mayre_gallery') || '[]');
            if (images.length === 0) {
                images = ["https://picsum.photos/id/1015/600/600","https://picsum.photos/id/1027/600/600","https://picsum.photos/id/1005/600/600"];
            }
            images.forEach(src => {
                const div = document.createElement('div');
                div.innerHTML = `<img src="${src}" class="rounded-3xl aspect-square object-cover w-full cursor-pointer" onclick="changeImage(this)">`;
                grid.appendChild(div);
            });
        }

        // ==================== GEDICHTE (mehrere möglich) ====================
        function loadPoems() {
            const container = document.getElementById('poems-container');
            container.innerHTML = '';
            let poems = JSON.parse(localStorage.getItem('mayre_poems') || '[]');
            
            if (poems.length === 0) {
                poems = [{
                    text: `<p>In stillen Stunden denk ich an dich,<br>an deine Wärme, dein Lächeln so licht.<br>Du bist gegangen, doch nie vergessen.</p><p class="text-right mt-6 text-rose-300">— Für Mayre</p>`
                }];
                localStorage.setItem('mayre_poems', JSON.stringify(poems));
            }

            poems.forEach((poem, index) => {
                const div = document.createElement('div');
                div.className = "border-l-4 border-rose-300 pl-8";
                div.innerHTML = `
                    <div class="prose prose-invert text-zinc-300 leading-relaxed text-lg italic">${poem.text}</div>
                    <button onclick="editExistingPoem(${index})" class="mt-4 text-xs text-rose-400 hover:text-rose-300">
                        <i class="fa-solid fa-pen"></i> Bearbeiten
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function addNewPoem() {
            currentEditPoemIndex = null;
            document.getElementById('poem-modal-title').textContent = "Neues Gedicht hinzufügen";
            document.getElementById('poem-textarea').value = '';
            document.getElementById('poem-modal').classList.remove('hidden');
            document.getElementById('poem-modal').classList.add('flex');
        }

        function editExistingPoem(index) {
            currentEditPoemIndex = index;
            document.getElementById('poem-modal-title').textContent = "Gedicht bearbeiten";
            let poems = JSON.parse(localStorage.getItem('mayre_poems') || '[]');
            document.getElementById('poem-textarea').value = poems[index].text;
            document.getElementById('poem-modal').classList.remove('hidden');
            document.getElementById('poem-modal').classList.add('flex');
        }

        function savePoem() {
            const text = document.getElementById('poem-textarea').value.trim();
            if (!text) return;

            let poems = JSON.parse(localStorage.getItem('mayre_poems') || '[]');
            
            if (currentEditPoemIndex !== null) {
                poems[currentEditPoemIndex].text = text;
            } else {
                poems.push({ text });
            }
            
            localStorage.setItem('mayre_poems', JSON.stringify(poems));
            closePoemModal();
            loadPoems();
        }

        function closePoemModal() {
            document.getElementById('poem-modal').classList.add('hidden');
            document.getElementById('poem-modal').classList.remove('flex');
        }

        // Export (wichtig für dauerhafte Änderungen)
        function exportConfig() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'mayre-berkpinar.html';
            link.click();
            alert('Datei heruntergeladen. Diese neue Version hochladen, damit alle Änderungen (Fotos + Gedichte) dauerhaft für alle sichtbar sind.');
        }

        // Init
        window.onload = () => {
            loadGallery();
            loadPoems();
            // Candle, Comments etc. können bei Bedarf ergänzt werden
            console.log('%cMayre Berkpinar Seite geladen', 'color:#e11d48');
        };
    </script>
</body>
</html>
