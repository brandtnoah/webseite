// ===============================
// CLEAN FUNCTION
// ===============================
function clean(v){
    if(!v || v === "." || v.trim() === "") return 0;
    return parseFloat(v);
}

const rain = {};
const wind = {};

raw.trim().split("\n").forEach(l=>{
    const [d,r,w] = l.split("\t");
    rain[d]=clean(r);
    wind[d]=clean(w);
});

// ===============================
// SERIES
// ===============================
const start = new Date("2018-01-26");
const end = new Date("2018-12-31");

const labels = [];
const rainVals = [];
const windVals = [];

for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const ds = d.toISOString().slice(0,10);
    labels.push(ds);
    rainVals.push(rain[ds] ?? 0);
    windVals.push(wind[ds] ?? 0);
}

// ===============================
// STATS
// ===============================
function stats(arr){
    const v = arr.filter(x => !isNaN(x));
    const sum = v.reduce((a,b)=>a+b,0);
    return {
        min: Math.min(...v),
        max: Math.max(...v),
        avg: sum / v.length,
        sum: sum
    };
}

const rS = stats(rainVals);
const wS = stats(windVals);

// ===============================
// CHART
// ===============================
const chart = new Chart(document.getElementById("chart"), {
    data: {
        labels,
        datasets: [
            {
                type: "bar",
                label: "Regentopf (mm)",
                data: rainVals,
                yAxisID: "y1"
            },
            {
                type: "line",
                label: "Mittelwind",
                data: windVals,
                yAxisID: "y2",
                tension: 0.25,
                pointRadius: 0
            }
        ]
    },
    options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        scales: {
            y1: { type: "linear", position: "left" },
            y2: { type: "linear", position: "right", grid: { drawOnChartArea: false } }
        }
    }
});

    if(type === "wind"){

    if(type === "drought"){

    }
    if(type === "storm"){
        box.innerHTML = "⛈ Stürme: Mehrere markante Ereignisse im Jahresverlauf.";
    }
}
