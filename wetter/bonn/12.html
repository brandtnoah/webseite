<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mein Profil</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
}

#wxPanel{
  position:fixed;
  right:20px;
  top:80px;
  width:240px;
  background:#fdfdfd;
  border:1px solid #ddd;
  box-shadow:0 2px 0 #ddd;
  overflow:hidden;
}

.wxTopBar{
  background:#257fba;
  height:6px;
}

.wxBlockTitle{
  background:#257fba;
  color:#fff;
  padding:4px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:13px;
  text-transform:uppercase;
}

.wxLeft{
  display:flex;
  align-items:center;
  gap:6px;
}

.wxIcon{
  width:16px;
  height:16px;
  fill:white;
}

.wxInfoIcon{
  width:16px;
  height:16px;
  fill:white;
  opacity:0.85;
  cursor:pointer;
}

.infoBox{
  display:none;
  background:#fff;
  font-size:11px;
  padding:8px;
  border-bottom:1px solid #ddd;
}

.wxContent{
  padding:10px;
  background:#fbfbfb;
}

.profileCard{
  background:#fff;
  border:1px solid #e5e5e5;
  margin-bottom:6px;
  padding:6px;
  cursor:pointer;
}

.label{
  font-size:10px;
  color:#666;
  text-transform:uppercase;
}

.value{
  font-size:12px;
  font-weight:bold;
}

/* INPUTS */
input, select{
  width:100%;
  margin-top:3px;
  padding:4px;
  font-size:11px;
}

/* BUTTONS */
.wxButtons{
  display:flex;
  gap:4px;
  margin-top:8px;
}

.btn{
  flex:1;
  background:#257fba;
  color:#fff;
  text-align:center;
  padding:4px;
  font-size:11px;
  cursor:pointer;
}

/* LIST */
.sectionTitle{
  margin-top:10px;
  font-size:11px;
  font-weight:bold;
  color:#257fba;
  border-bottom:2px solid #257fba;
  padding-bottom:4px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #e6e6e6;
  font-size:11px;
}

.item a{
  color:#257fba;
  text-decoration:none;
}

.item span{
  color:red;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="wxPanel">

  <div class="wxTopBar"></div>

  <div class="wxBlockTitle">

    <div class="wxLeft">
      <svg class="wxIcon" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-4.4 0-8 2.2-8 5v3h16v-3c0-2.8-3.6-5-8-5z"/>
      </svg>
      Mein Profil
    </div>

    <svg class="wxInfoIcon" onclick="toggleInfo()" viewBox="0 0 24 24">
      <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
    </svg>

  </div>

  <div class="infoBox" id="infoBox">
    Orte = Favorisierte, abgespeicherte Orte<br>
    Seiten = andere donnerwetter.de-URLs<br>
    Klick = bearbeiten<br>
    Enter = speichern
  </div>

  <div class="wxContent">

    <div id="profileView"></div>

    <div class="wxButtons">
      <div class="btn" onclick="saveCity()">Ort</div>
      <div class="btn" onclick="savePage()">Seite</div>
    </div>

    <div class="sectionTitle">Orte</div>
    <div id="cityList"></div>

    <div class="sectionTitle">Seiten</div>
    <div id="pageList"></div>

  </div>

</div>

<script>

/* INFO */
function toggleInfo(){
  infoBox.style.display = infoBox.style.display === "block" ? "none" : "block";
}

/* ENTER SAVE */
function bindEnter(el, key){
  el.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
      localStorage.setItem(key, el.value || "eintragen");
      renderProfile();
    }
  });
}

/* PROFILE EDIT */
function makeInput(el,key,type="text"){

  let old = localStorage.getItem(key) || "eintragen";

  let input;

  if(type==="select"){
    input = document.createElement("select");

    const options = [
      "Meteorologe",
      "Hobbymeteorologe",
      "Sonnen-Fan",
      "Regen-Liebhaber",
      "Sturm-Jäger",
      "Winter-Fan"
    ];

    options.forEach(o=>{
      let opt = document.createElement("option");
      opt.value=o;
      opt.textContent=o;
      if(o===old) opt.selected=true;
      input.appendChild(opt);
    });

    input.onchange = ()=>{
      localStorage.setItem(key,input.value);
      renderProfile();
    };

  } else {
    input = document.createElement("input");
    input.value = old;
    bindEnter(input,key);

    input.onblur = ()=>{
      localStorage.setItem(key,input.value || "eintragen");
      renderProfile();
    };
  }

  el.innerHTML="";
  el.appendChild(input);
  input.focus();
}

/* PROFILE */
function renderProfile(){

  profileView.innerHTML = `
    <div class="profileCard" onclick="makeInput(this,'wx_username')">
      <div class="label">Name</div>
      <div class="value">${localStorage.getItem("wx_username")||"eintragen"}</div>
    </div>

    <div class="profileCard" onclick="makeInput(this,'wx_type','select')">
      <div class="label">Typ</div>
      <div class="value">${localStorage.getItem("wx_type")||"eintragen"}</div>
    </div>

    <div class="profileCard" onclick="makeInput(this,'wx_quote')">
      <div class="label">Zitat</div>
      <div class="value">${localStorage.getItem("wx_quote")||"eintragen"}</div>
    </div>
  `;
}

/* CITY DETECTION */
function isCity(){
  return location.pathname.startsWith("/wetter/");
}

function getCity(){
  return location.pathname.split("/wetter/")[1]?.split("/")[0];
}

function getPage(){
  return location.pathname;
}

/* STORAGE */
function getData(){
  return JSON.parse(localStorage.getItem("wx_profile")) || {cities:[],pages:[]};
}

function saveData(d){
  localStorage.setItem("wx_profile",JSON.stringify(d));
}

/* SAVE CITY */
function saveCity(){
  if(!isCity()) return;

  let d=getData();
  let city=getCity();

  if(city && !d.cities.find(x=>x.name===city)){
    d.cities.push({name:city,url:location.pathname});
  }

  saveData(d);
  renderLists();
}

/* SAVE PAGE */
function savePage(){
  if(isCity()) return;

  let d=getData();
  let page=getPage();

  if(!d.pages.find(x=>x.url===page)){
    d.pages.push({name:page.split("/").pop(),url:page});
  }

  saveData(d);
  renderLists();
}

/* REMOVE */
function remove(type,name){
  let d=getData();
  d[type]=d[type].filter(x=>x.name!==name);
  saveData(d);
  renderLists();
}

/* LISTS */
function renderLists(){

  let d=getData();

  cityList.innerHTML="";
  pageList.innerHTML="";

  d.cities.forEach(c=>{
    cityList.innerHTML+=`
      <div class="item">
        <a href="${c.url}">${c.name}</a>
        <span onclick="remove('cities','${c.name}')">x</span>
      </div>`;
  });

  d.pages.forEach(p=>{
    pageList.innerHTML+=`
      <div class="item">
        <a href="${p.url}">${p.name}</a>
        <span onclick="remove('pages','${p.name}')">x</span>
      </div>`;
  });
}

/* INIT */
window.addEventListener("load",()=>{
  renderProfile();
  renderLists();
});

</script>

</body>
</html>
