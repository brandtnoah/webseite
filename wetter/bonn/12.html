<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterprofil</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

#wxPanel{
  position:fixed;
  right:20px;
  top:100px;
  width:220px;
  background:#0b1f3a;
  color:#e6f0ff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  font-size:10.5px;
}

.wxHeader{
  background:#102a4d;
  padding:5px;
  font-weight:bold;
  font-size:11px;
}

.profileCard{
  margin:3px;
  background:#0f2a4f;
  border:1px solid #1e3b63;
  border-radius:6px;
  padding:3px 5px;
}

.label{
  font-size:8px;
  opacity:0.7;
  text-transform:uppercase;
}

.value{
  font-size:10px;
  font-weight:bold;
}

.wxBlock{
  padding:4px;
  border-bottom:1px solid #1e3b63;
}

.wxBlock input,
.wxBlock select{
  width:100%;
  padding:3px;
  margin:1px 0;
  border:none;
  border-radius:5px;
  background:#112c52;
  color:#fff;
  font-size:10px;
  height:20px;
}

/* BUTTONS */
.wxFooter{
  display:flex;
  align-items:center;
  gap:3px;
  padding:5px;
}

.wxMiniBtn{
  flex:1;
  padding:2px;
  text-align:center;
  background:#1f4e8a;
  border-radius:5px;
  cursor:pointer;
  font-size:9.5px;
  font-weight:bold;
}

.wxInfoBtn{
  width:20px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#16365f;
  border-radius:5px;
  cursor:pointer;
  font-size:11px;
}

.wxInfoBox{
  display:none;
  padding:6px;
  margin:5px;
  background:#0f2a4f;
  border:1px solid #1e3b63;
  border-radius:6px;
  font-size:9.5px;
}

.wxSub{
  padding:5px 7px;
  font-weight:bold;
  background:#102a4d;
  font-size:10px;
}

.item{
  padding:3px 6px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #1e3b63;
}

.item a{
  color:#8fc1ff;
  text-decoration:none;
  font-size:10px;
}

.item span{
  color:#ff6b6b;
  cursor:pointer;
  font-size:9px;
}
</style>

</head>

<body>

<div id="wxPanel">

  <div class="wxHeader">👤 Wetterprofil</div>

  <div id="profileView"></div>

  <div id="profileEdit" class="wxBlock" style="display:none;">
    <input id="username" placeholder="Name">
    <select id="weathertype">
      <option>Normal</option>
      <option>Sommer</option>
      <option>Winter</option>
      <option>Sturm</option>
      <option>Regen</option>
    </select>
    <input id="favweather" placeholder="Wetter">
    <input id="quote" placeholder="Zitat">
  </div>

  <div class="wxFooter">

    <div class="wxMiniBtn" onclick="saveCity()">⭐ Ort</div>
    <div class="wxMiniBtn" onclick="savePage()">📄 Seite</div>
    <div class="wxMiniBtn" onclick="toggleEdit()">✏️</div>

    <div class="wxInfoBtn" onclick="toggleInfo()">ⓘ</div>

  </div>

  <div class="wxInfoBox" id="infoBox">
    ⭐ speichert NUR /wetter/... als Ort<br>
    📄 speichert ALLES außer /wetter/...<br>
    ✏️ Profil bearbeiten
  </div>

  <div class="wxSub">📍 Orte</div>
  <div id="cityList"></div>

  <div class="wxSub">📄 Seiten</div>
  <div id="pageList"></div>

</div>

<script>

/* INFO */
function toggleInfo(){
  infoBox.style.display =
    (infoBox.style.display === "block") ? "none" : "block";
}

/* FORMAT */
function format(s){
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
}

/* STRIKTE ERKENNUNG */
function isWeatherCity(){
  return location.pathname.startsWith("/wetter/");
}

/* CITY */
function getCity(){
  if(!isWeatherCity()) return null;

  let p = location.pathname.split("/wetter/")[1] || "";
  p = p.split("/")[0];
  p = p.split(".")[0];
  return p;
}

/* PAGE */
function getPage(){
  return location.pathname;
}

/* PROFILE */
function saveProfile(){
  localStorage.setItem("wx_username", username.value);
  localStorage.setItem("wx_type", weathertype.value);
  localStorage.setItem("wx_favweather", favweather.value);
  localStorage.setItem("wx_quote", quote.value);
  renderProfile();
}

function toggleEdit(){
  profileEdit.style.display =
    profileEdit.style.display === "none" ? "block" : "none";
}

/* PROFILE VIEW */
function renderProfile(){

  profileView.innerHTML = `
    <div class="profileCard">
      <span class="label">Name</span>
      <div class="value">${format(localStorage.getItem("wx_username") || "Gast")}</div>
    </div>

    <div class="profileCard">
      <span class="label">Typ</span>
      <div class="value">${localStorage.getItem("wx_type") || "-"}</div>
    </div>

    <div class="profileCard">
      <span class="label">Wetter</span>
      <div class="value">${localStorage.getItem("wx_favweather") || "-"}</div>
    </div>

    <div class="profileCard">
      <span class="label">Zitat</span>
      <div class="value">${localStorage.getItem("wx_quote") || "-"}</div>
    </div>
  `;
}

/* STORAGE */
function getData(){
  return JSON.parse(localStorage.getItem("wx_profile")) || {
    cities: [],
    pages: []
  };
}

function saveData(d){
  localStorage.setItem("wx_profile", JSON.stringify(d));
}

/* ⭐ ORT (STRICT) */
function saveCity(){

  if(!isWeatherCity()) return; // 🔥 HARD STOP

  let d = getData();
  let city = getCity();

  if(city && !d.cities.find(x => x.name === city)){
    d.cities.push({
      name: city,
      url: location.pathname
    });
  }

  saveData(d);
  renderLists();
}

/* 📄 SEITE (STRICT) */
function savePage(){

  if(isWeatherCity()) return; // 🔥 HARD STOP

  let d = getData();
  let page = getPage();

  let name = page.split("/").filter(Boolean).pop();

  if(!d.pages.find(x => x.url === page)){
    d.pages.push({
      name: name,
      url: page
    });
  }

  saveData(d);
  renderLists();
}

/* REMOVE */
function remove(type, name){
  let d = getData();
  d[type] = d[type].filter(x => x.name !== name);
  saveData(d);
  renderLists();
}

/* LISTS */
function renderLists(){

  let d = getData();

  cityList.innerHTML = "";
  pageList.innerHTML = "";

  d.cities.forEach(c=>{
    cityList.innerHTML += `
      <div class="item">
        <a href="${c.url}">📍 ${format(c.name)}</a>
        <span onclick="remove('cities','${c.name}')">x</span>
      </div>`;
  });

  d.pages.forEach(p=>{
    pageList.innerHTML += `
      <div class="item">
        <a href="${p.url}">📄 ${format(p.name)}</a>
        <span onclick="remove('pages','${p.name}')">x</span>
      </div>`;
  });
}

/* INIT */
window.addEventListener("load", ()=>{

  username.value = localStorage.getItem("wx_username") || "";
  weathertype.value = localStorage.getItem("wx_type") || "Normal";
  favweather.value = localStorage.getItem("wx_favweather") || "";
  quote.value = localStorage.getItem("wx_quote") || "";

  renderProfile();
  renderLists();
});

</script>

</body>
</html>
