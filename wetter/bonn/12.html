<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterprofil</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* =========================
   SIDEBAR
   ========================= */
#wxPanel{
  position:fixed;
  right:20px;
  top:100px;
  width:220px;
  background:#0b1f3a;
  color:#e6f0ff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  font-size:11px;
}

/* HEADER */
.wxHeader{
  background:#102a4d;
  padding:7px;
  font-weight:bold;
}

/* PROFILE VIEW */
.profileCard{
  margin:5px;
  background:#0f2a4f;
  border:1px solid #1e3b63;
  border-radius:8px;
  padding:5px 7px;
}

.label{
  font-size:9px;
  opacity:0.7;
  text-transform:uppercase;
}

.value{
  font-size:11px;
  font-weight:bold;
}

/* EDIT */
.wxBlock{
  padding:6px;
  border-bottom:1px solid #1e3b63;
}

.wxBlock input,
.wxBlock select{
  width:100%;
  padding:5px;
  margin:2px 0;
  border:none;
  border-radius:6px;
  background:#112c52;
  color:#fff;
  font-size:11px;
}

/* BUTTON */
.wxBtn{
  margin:6px;
  padding:5px;
  text-align:center;
  background:#1f4e8a;
  border-radius:7px;
  cursor:pointer;
  font-weight:bold;
  font-size:11px;
}

/* LISTS */
.wxSub{
  padding:6px 8px;
  font-weight:bold;
  background:#102a4d;
}

.item{
  padding:4px 8px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #1e3b63;
}

.item a{
  color:#8fc1ff;
  text-decoration:none;
}

.item span{
  color:#ff6b6b;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="wxPanel">

  <div class="wxHeader">👤 Mein Wetterprofil</div>

  <!-- PROFILE -->
  <div id="profileView"></div>

  <!-- EDIT -->
  <div id="profileEdit" class="wxBlock" style="display:none;">

    <input id="username" placeholder="Benutzername">

    <select id="weathertype">
      <option>Normal</option>
      <option>Sommer-Fan</option>
      <option>Winter-Fan</option>
      <option>Sturm-Jäger</option>
      <option>Regen-Liebhaber</option>
    </select>

    <input id="favweather" placeholder="Lieblingswetter">
    <input id="quote" placeholder="Zitat">

  </div>

  <div class="wxBtn" onclick="toggleEdit()" id="editBtn">
    ✏️ Bearbeiten
  </div>

  <div class="wxBtn" onclick="saveCurrent()">
    ⭐ Speichern
  </div>

  <div class="wxSub">📍 Meine Orte</div>
  <div id="cityList"></div>

  <div class="wxSub">📄 Meine Seiten</div>
  <div id="pageList"></div>

</div>

<script>

/* =========================
   FORMAT
   ========================= */
function format(str){
  if(!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

/* =========================
   URL CHECK
   ========================= */
function isCity(){
  return window.location.pathname.toLowerCase().includes("/wetter/");
}

/* Ort extrahieren */
function cleanCityFromURL(){

  let path = window.location.pathname.toLowerCase();

  if(path.includes("/wetter/")){
    let part = path.split("/wetter/")[1] || "";
    part = part.split("/")[0];
    part = part.split(".")[0];
    return part;
  }

  return null;
}

/* Seitenname */
function getPageValue(){
  return window.location.pathname
    .split("/")
    .filter(Boolean)
    .pop()
    .replace(".html","")
    .toLowerCase();
}

/* =========================
   PROFILE SAVE
   ========================= */
function saveProfile(){
  localStorage.setItem("wx_username", document.getElementById("username").value);
  localStorage.setItem("wx_type", document.getElementById("weathertype").value);
  localStorage.setItem("wx_favweather", document.getElementById("favweather").value);
  localStorage.setItem("wx_quote", document.getElementById("quote").value);

  renderProfile();
  toggleEdit(false);
}

/* =========================
   VIEW ↔ EDIT
   ========================= */
function toggleEdit(force){

  const edit = document.getElementById("profileEdit");
  const view = document.getElementById("profileView");

  const showEdit = (force !== undefined)
    ? force
    : edit.style.display === "none";

  edit.style.display = showEdit ? "block" : "none";
  view.style.display = showEdit ? "none" : "block";

  document.getElementById("editBtn").innerText =
    showEdit ? "👁️ Anzeigen" : "✏️ Bearbeiten";
}

/* =========================
   PROFILE VIEW
   ========================= */
function renderProfile(){

  const name = localStorage.getItem("wx_username") || "Gast";
  const type = localStorage.getItem("wx_type") || "-";
  const fav  = localStorage.getItem("wx_favweather") || "-";
  const quote = localStorage.getItem("wx_quote") || "-";

  document.getElementById("profileView").innerHTML = `
    <div class="profileCard">
      <span class="label">Benutzername</span>
      <div class="value">${format(name)}</div>
    </div>

    <div class="profileCard">
      <span class="label">Wetter-Typ</span>
      <div class="value">${type}</div>
    </div>

    <div class="profileCard">
      <span class="label">Lieblingswetter</span>
      <div class="value">${fav}</div>
    </div>

    <div class="profileCard">
      <span class="label">Zitat</span>
      <div class="value">"${quote}"</div>
    </div>
  `;
}

/* =========================
   STORAGE
   ========================= */
function getData(){
  return JSON.parse(localStorage.getItem("wx_profile")) || {
    cities: [],
    pages: []
  };
}

function saveData(d){
  localStorage.setItem("wx_profile", JSON.stringify(d));
}

/* =========================
   SAVE CURRENT PAGE (FIXED)
   ========================= */
function saveCurrent(){

  let data = getData();

  if(isCity()){

    let city = cleanCityFromURL();

    if(city && !data.cities.find(x => x.name === city)){

      data.cities.push({
        name: city,
        url: window.location.pathname
      });
    }

  } else {

    let page = getPageValue();

    if(!data.pages.find(x => x.name === page)){

      data.pages.push({
        name: page,
        url: window.location.pathname
      });
    }
  }

  saveData(data);
  renderLists();
}

/* =========================
   REMOVE FIXED
   ========================= */
function remove(type, name){

  let data = getData();

  data[type] = data[type].filter(x => x.name !== name);

  saveData(data);
  renderLists();
}

/* =========================
   LISTS (FIXED LINKS)
   ========================= */
function renderLists(){

  const data = getData();

  const cityBox = document.getElementById("cityList");
  const pageBox = document.getElementById("pageList");

  cityBox.innerHTML = "";
  pageBox.innerHTML = "";

  data.cities.forEach(c=>{
    cityBox.innerHTML += `
      <div class="item">
        <a href="${c.url}">📍 ${format(c.name)}</a>
        <span onclick="remove('cities','${c.name}')">x</span>
      </div>
    `;
  });

  data.pages.forEach(p=>{
    pageBox.innerHTML += `
      <div class="item">
        <a href="${p.url}">📄 ${format(p.name)}</a>
        <span onclick="remove('pages','${p.name}')">x</span>
      </div>
    `;
  });
}

/* =========================
   INIT
   ========================= */
window.addEventListener("load", ()=>{

  document.getElementById("username").value = localStorage.getItem("wx_username") || "";
  document.getElementById("weathertype").value = localStorage.getItem("wx_type") || "Normal";
  document.getElementById("favweather").value = localStorage.getItem("wx_favweather") || "";
  document.getElementById("quote").value = localStorage.getItem("wx_quote") || "";

  renderProfile();
  renderLists();

  toggleEdit(false);
});

</script>

</body>
</html>
