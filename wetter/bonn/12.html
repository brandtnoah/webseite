<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetterprofil</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

#wxPanel{
  position:fixed;
  right:20px;
  top:100px;
  width:220px;
  background:#0b1f3a;
  color:#e6f0ff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  font-size:10.5px;
}

.wxHeader{
  background:#102a4d;
  padding:5px;
  font-weight:bold;
  font-size:11px;
}

.profileCard{
  margin:3px;
  background:#0f2a4f;
  border:1px solid #1e3b63;
  border-radius:6px;
  padding:3px 5px;
}

.label{
  font-size:8px;
  opacity:0.7;
  text-transform:uppercase;
}

.value{
  font-size:10px;
  font-weight:bold;
}

.editInput,
.editSelect{
  width:100%;
  margin-top:2px;
  padding:2px;
  font-size:10px;
  border:none;
  border-radius:4px;
  background:#112c52;
  color:#fff;
}

/* BUTTONS */
.wxFooter{
  display:flex;
  gap:3px;
  padding:5px;
}

.wxMiniBtn{
  flex:1;
  padding:2px;
  text-align:center;
  background:#1f4e8a;
  border-radius:5px;
  cursor:pointer;
  font-size:9.5px;
  font-weight:bold;
}

.wxInfoBtn{
  width:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#16365f;
  border-radius:5px;
  cursor:pointer;
}

/* INFO */
.wxInfoBox{
  display:none;
  padding:6px;
  margin:5px;
  background:#0f2a4f;
  border:1px solid #1e3b63;
  border-radius:6px;
  font-size:9.5px;
}

.wxSub{
  padding:5px 7px;
  font-weight:bold;
  background:#102a4d;
  font-size:10px;
}

.item{
  padding:3px 6px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #1e3b63;
}

.item a{
  color:#8fc1ff;
  text-decoration:none;
  font-size:10px;
}

.item span{
  color:#ff6b6b;
  cursor:pointer;
  font-size:9px;
}
</style>

</head>

<body>

<div id="wxPanel">

  <div class="wxHeader">👤 Wetterprofil</div>

  <div id="profileView"></div>

  <div class="wxFooter">

    <div class="wxMiniBtn" onclick="saveCity()">⭐ Ort</div>
    <div class="wxMiniBtn" onclick="savePage()">📄 Seite</div>
    <div class="wxMiniBtn" onclick="toggleEdit()">✏️</div>
    <div class="wxInfoBtn" onclick="toggleInfo()">ⓘ</div>

  </div>

  <div class="wxInfoBox" id="infoBox">
    ⭐ speichert den aktuellen Ort<br>
    📄 speichert die aktuelle Seite<br>
    ✏️ bearbeiten / speichern
  </div>

  <div class="wxSub">📍 Orte</div>
  <div id="cityList"></div>

  <div class="wxSub">📄 Seiten</div>
  <div id="pageList"></div>

</div>

<script>

/* INFO */
function toggleInfo(){
  infoBox.style.display =
    infoBox.style.display === "block" ? "none" : "block";
}

/* FORMAT */
function format(s){
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
}

/* CITY CHECK */
function isCity(){
  return location.pathname.startsWith("/wetter/");
}

function getCity(){
  if(!isCity()) return null;
  let p = location.pathname.split("/wetter/")[1] || "";
  return p.split("/")[0].split(".")[0];
}

function getPage(){
  return location.pathname;
}

/* PROFILE SAVE */
function saveProfile(){

  localStorage.setItem("wx_username", username.value);
  localStorage.setItem("wx_type", weathertype.value);
  localStorage.setItem("wx_favweather", favweather.value);
  localStorage.setItem("wx_quote", quote.value);

  editMode = false;
  renderProfile();
}

/* EDIT MODE */
let editMode = false;

function toggleEdit(){
  editMode = !editMode;
  renderProfile();
}

/* PROFILE VIEW + EDIT */
function renderProfile(){

  const n = localStorage.getItem("wx_username") || "Gast";
  const t = localStorage.getItem("wx_type") || "Meteorologe";
  const f = localStorage.getItem("wx_favweather") || "";
  const q = localStorage.getItem("wx_quote") || "";

  profileView.innerHTML = `
    <div class="profileCard">
      <div class="label">Name</div>
      ${
        editMode
        ? `<input class="editInput" id="username" value="${n}">`
        : `<div class="value">${format(n)}</div>`
      }
    </div>

    <div class="profileCard">
      <div class="label">Wetter-Typ</div>
      ${
        editMode
        ? `
          <select class="editSelect" id="weathertype">
            <option>Meteorologe</option>
            <option>Hobbymeteorologe</option>
            <option>Sonnen-Fan</option>
            <option>Regen-Liebhaber</option>
            <option>Sturm-Jäger</option>
            <option>Winter-Fan</option>
          </select>
        `
        : `<div class="value">${t}</div>`
      }
    </div>

    <div class="profileCard">
      <div class="label">Wetter</div>
      ${
        editMode
        ? `<input class="editInput" id="favweather" value="${f}">`
        : `<div class="value">${f || "-"}</div>`
      }
    </div>

    <div class="profileCard">
      <div class="label">Zitat</div>
      ${
        editMode
        ? `<input class="editInput" id="quote" value="${q}">`
        : `<div class="value">${q || "-"}</div>`
      }
    </div>

    ${
      editMode
      ? `<div class="wxMiniBtn" style="margin:5px;" onclick="saveProfile()">💾 Speichern</div>`
      : ""
    }
  `;
}

/* SAVE CITY (STRICT) */
function saveCity(){
  if(!isCity()) return;

  let d = getData();
  let city = getCity();

  if(city && !d.cities.find(x => x.name === city)){
    d.cities.push({ name: city, url: location.pathname });
  }

  saveData(d);
  renderLists();
}

/* SAVE PAGE (STRICT) */
function savePage(){
  if(isCity()) return;

  let d = getData();
  let page = getPage();

  if(!d.pages.find(x => x.url === page)){
    d.pages.push({
      name: page.split("/").pop(),
      url: page
    });
  }

  saveData(d);
  renderLists();
}

/* STORAGE */
function getData(){
  return JSON.parse(localStorage.getItem("wx_profile")) || {
    cities: [],
    pages: []
  };
}

function saveData(d){
  localStorage.setItem("wx_profile", JSON.stringify(d));
}

/* REMOVE */
function remove(type, name){
  let d = getData();
  d[type] = d[type].filter(x => x.name !== name);
  saveData(d);
  renderLists();
}

/* LISTS */
function renderLists(){

  let d = getData();

  cityList.innerHTML = "";
  pageList.innerHTML = "";

  d.cities.forEach(c=>{
    cityList.innerHTML += `
      <div class="item">
        <a href="${c.url}">📍 ${format(c.name)}</a>
        <span onclick="remove('cities','${c.name}')">x</span>
      </div>`;
  });

  d.pages.forEach(p=>{
    pageList.innerHTML += `
      <div class="item">
        <a href="${p.url}">📄 ${format(p.name)}</a>
        <span onclick="remove('pages','${p.name}')">x</span>
      </div>`;
  });
}

/* INIT */
window.addEventListener("load", ()=>{
  renderProfile();
  renderLists();
});

</script>

</body>
</html>
