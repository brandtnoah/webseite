<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mein Profil - Wetter</title>

<style>
/* =========================
   SIDEBAR DESIGN
   ========================= */
#wxPanel{
  position:fixed;
  right:20px;
  top:120px;
  width:230px;
  font-family:Tahoma, Arial, sans-serif;
  font-size:12px;
  background:#f2f2f2;
  border:1px solid #bdbdbd;
}

/* HEADER */
.wxHeader{
  background:#d9e6f2;
  border-bottom:1px solid #9fb7d1;
  padding:6px;
  font-weight:bold;
  color:#1f3b5c;
}

/* CURRENT */
.wxCurrent{
  padding:6px;
  background:#fff;
  border-bottom:1px solid #d0d0d0;
}

/* BUTTON */
.wxBtn{
  margin:6px;
  padding:5px;
  text-align:center;
  background:#e6e6e6;
  border:1px solid #a0a0a0;
  cursor:pointer;
}

/* DIVIDER */
.wxDivider{
  border-top:1px solid #bdbdbd;
}

/* SECTION TITLE */
.wxSub{
  padding:6px;
  font-weight:bold;
  background:#efefef;
}

/* ITEM */
.item{
  padding:4px 6px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #e0e0e0;
}

.item a{
  color:#1a4f8b;
  text-decoration:none;
}

.item span{
  color:#b00000;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- =========================
     SIDEBAR
     ========================= -->
<div id="wxPanel">

  <div class="wxHeader">👤 Mein Profil</div>

  <div class="wxCurrent">
    Aktuell:<br>
    <b id="currentPage">—</b>
  </div>

  <div class="wxBtn" onclick="saveCurrent()">
    ⭐ Speichern
  </div>

  <div class="wxDivider"></div>

  <div class="wxSub">📍 Meine Orte</div>
  <div id="cityList"></div>

  <div class="wxDivider"></div>

  <div class="wxSub">📄 Meine Seiten</div>
  <div id="pageList"></div>

</div>

<script>

/* =========================
   URL ERKENNUNG
   ========================= */
function getTypeFromURL(){
  const path = window.location.pathname.toLowerCase();

  // ALLES unter /wetter/ = ORT
  if(path.startsWith("/wetter/")){
    return "city";
  }

  return "page";
}

function getValueFromURL(){
  return decodeURIComponent(
    window.location.pathname
      .split("/")
      .filter(Boolean)
      .pop()
      .replace(".html","")
      .toLowerCase()
  );
}

/* =========================
   STORAGE
   ========================= */
function getData(){
  return JSON.parse(localStorage.getItem("wx_profile")) || {
    cities: [],
    pages: []
  };
}

function saveData(data){
  localStorage.setItem("wx_profile", JSON.stringify(data));
}

/* =========================
   SPEICHERN
   ========================= */
function saveCurrent(){

  const type = getTypeFromURL();
  const value = getValueFromURL();

  let data = getData();

  if(type === "city"){
    if(!data.cities.includes(value)){
      data.cities.push(value);
    }
  } else {
    if(!data.pages.includes(value)){
      data.pages.push(value);
    }
  }

  saveData(data);
  render();
}

/* =========================
   LÖSCHEN
   ========================= */
function remove(type, val){
  let data = getData();

  data[type] = data[type].filter(x => x !== val);

  saveData(data);
  render();
}

/* =========================
   RENDER
   ========================= */
function render(){
  const data = getData();

  const cityBox = document.getElementById("cityList");
  const pageBox = document.getElementById("pageList");

  cityBox.innerHTML = "";
  pageBox.innerHTML = "";

  data.cities.forEach(c => {
    cityBox.innerHTML += `
      <div class="item">
        <a href="/wetter/${c}">📍 ${c}</a>
        <span onclick="remove('cities','${c}')">x</span>
      </div>
    `;
  });

  data.pages.forEach(p => {
    pageBox.innerHTML += `
      <div class="item">
        <a href="/${p}">📄 ${p}</a>
        <span onclick="remove('pages','${p}')">x</span>
      </div>
    `;
  });
}

/* =========================
   INIT
   ========================= */
window.addEventListener("load", () => {
  document.getElementById("currentPage").innerText =
    getValueFromURL();

  render();
});

</script>

</body>
</html>
