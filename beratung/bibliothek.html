    <style>

<body id="body">

<div style="text-align:right; padding:10px 20px;">
    <button onclick="showDE()">Deutsch</button>

    <button onclick="adjustFontSize(-2)">A-</button>
    <button onclick="resetAccessibility()">Ursprünglich</button> |
    <button onclick="toggleMobile()">Mobile Version</button>
</div>

<header style="text-align:center; padding:20px; font-size:32px; font-weight:bold;">
    noahbrandt
</header>

<div id="de" style="flex:1; padding:20px;">

<nav style="margin-bottom:20px; padding:15px; border:4px solid #000; background-color:#ff9a33; text-align:center;">
    <a href="#">Startseite</a>
    <a href="#">Lebenslauf</a>
    <a href="#">Beratung</a>
    <a href="#">Kontakt</a>
</nav>

<div class="container">

<div class="left-box">
    <h2 style="text-align:center;">Noah Brandt</h2>
    <img src="https://profile-images.xing.com/images/543ff266011755480f4aa4d1c3075afc-1/noah-brandt.256x256.jpg" style="width:100%;">
</div>

<!-- ✅ HIER IST DIE INTEGRATION -->
<div class="middle-box">
    <h2 style="text-align:center;">Beratungen</h2>

    <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">

        <div style="border:2px solid #000; padding:15px; width:250px;">
            <h3>Karriereberatung</h3>
            <select id="t1" style="width:100%;">
                <option value="">Termin wählen</option>
                <option>Mo 10:00</option>
                <option>Di 14:00</option>
            </select>
            <button onclick="anmelden('Karriereberatung','t1')">Kostenfrei anmelden</button>
        </div>

        <div style="border:2px solid #000; padding:15px; width:250px;">
            <h3>Gründungsberatung</h3>
            <select id="t2" style="width:100%;">
                <option value="">Termin wählen</option>
                <option>Mi 11:00</option>
                <option>Do 15:00</option>
            </select>
            <button onclick="anmelden('Gründungsberatung','t2')">Kostenfrei anmelden</button>
        </div>

        <div style="border:2px solid #000; padding:15px; width:250px;">
            <h3>Finanzberatung</h3>
            <select id="t3" style="width:100%;">
                <option value="">Termin wählen</option>
                <option>Di 10:00</option>
                <option>Fr 14:00</option>
            </select>
            <button onclick="anmelden('Finanzberatung','t3')">Kostenfrei anmelden</button>
        </div>

    </div>
</div>

<div class="right-box">
    <h2>Login</h2>
</div>

</div>
</div>

<script>
function anmelden(titel, id){
    let termin = document.getElementById(id).value;
    if(!termin){ alert("Termin wählen!"); return; }

    let mail = "beratung@noahbrandt.de";
    let subject = encodeURIComponent("Anmeldung: "+titel);
    let body = encodeURIComponent("Beratung: "+titel+"\nTermin: "+termin);

    window.location.href = `mailto:${mail}?subject=${subject}&body=${body}`;
}
</script>
